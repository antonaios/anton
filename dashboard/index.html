<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" type="image/png" href="/anton-favicon.png?v=2" />
    <link rel="apple-touch-icon" href="/anton-favicon.png?v=2" />
    <title>ANTON</title>
    <!-- Fonts self-hosted: Geist + Geist Mono via @fontsource-variable/geist(+mono) (imported in main.tsx, bundled by Vite) — no CDN link. -->
    <script>
      // Pre-paint theme — apply the stored choice before #root mounts (no FOUC).
      // Default (no stored value) = LIGHT teal (data-theme attribute absent).
      try {
        if (localStorage.getItem('anton-theme') === 'navy')
          document.documentElement.setAttribute('data-theme', 'navy');
      } catch (e) {}
    </script>
  </head>
  <body class="bg-bg text-t1">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
